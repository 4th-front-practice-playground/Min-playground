<section class="grid gap-8 rounded-2xl border bg-white p-6 shadow-sm md:grid-cols-[1fr_1fr]">
    <div class="flex h-80 items-center justify-center overflow-hidden rounded-xl bg-gray-100 text-gray-400">
        {% if product.image_url %}
        <img src="{{ product.image_url }}" alt="{{ product.name }}" class="h-full w-full object-cover" />
        {% else %}
        상품 이미지
        {% endif %}
    </div>

    <div class="flex flex-col justify-center">
        <p class="mb-2 text-sm font-medium text-red-600">{{ product.category }}</p>

        <h1 class="mb-4 text-3xl font-bold text-gray-900">{{ product.name }}</h1>

        <p class="mb-6 text-gray-600">{{ product.description }}</p>

        <p class="text-2xl font-bold text-red-600">{{ product.price|floatformat:0 }}원</p>
    </div>
</section>
