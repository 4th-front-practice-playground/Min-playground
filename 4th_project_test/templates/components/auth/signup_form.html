<div id="auth-panel-signup" class="auth-panel hidden">
    <h1 class="mb-6 text-center text-3xl font-bold text-gray-900">회원가입</h1>

    <form class="space-y-4">
        <input class="w-full rounded-lg border px-4 py-3 text-gray-900" placeholder="아이디" />
        <input class="w-full rounded-lg border px-4 py-3 text-gray-900" placeholder="이메일" />
        <input class="w-full rounded-lg border px-4 py-3 text-gray-900" type="password" placeholder="비밀번호" />
        <input class="w-full rounded-lg border px-4 py-3 text-gray-900" type="password" placeholder="비밀번호 확인" />

        <button type="button" class="w-full rounded-lg bg-red-600 py-3 font-semibold text-white hover:bg-red-700">
            회원가입
        </button>
    </form>

    <button type="button" data-auth-mode="login" class="mt-6 w-full text-sm text-gray-500">
        로그인으로 돌아가기
    </button>
</div>
