<header class="flex h-14 items-center justify-between border-b px-6">
    <a href="{% url 'mainpage:mainpage' %}" class="text-sm font-medium">
        Home
    </a>

    <div class="flex gap-2">
        {# 민혁 수정 #}
        {% if user.is_authenticated %}
        <form method="post" action="{% url 'accounts:logout' %}" class="inline">
            {% csrf_token %}
            <button type="submit" class="rounded bg-gray-100 px-4 py-2 text-sm hover:bg-gray-200">
                로그아웃
            </button>
        </form>
        {% else %}
        <a href="{% url 'accounts:loginpage' %}" class="rounded bg-gray-100 px-4 py-2 text-sm hover:bg-gray-200">
            로그인
        </a>
        {% endif %}
        <a href="{% url 'accounts:accountpage' %}" class="rounded bg-gray-100 px-4 py-2 text-sm hover:bg-gray-200">
            마이페이지
        </a>
    </div>
</header>
