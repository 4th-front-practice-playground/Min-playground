<div class="space-y-2">
    <p class="text-sm font-medium text-gray-800">{{ label }}</p>
    <div class="grid grid-cols-2 gap-2">
        <input type="number" name="{{ field }}__gte" inputmode="numeric" placeholder="최소{% if unit %} ({{ unit }}){% endif %}"
            class="w-full rounded-xl border border-gray-200 bg-white px-3 py-2 text-sm text-gray-900 outline-none transition-colors placeholder:text-gray-400 focus:border-red-500 focus:ring-2 focus:ring-red-500/20"
            data-filter-param />
        <input type="number" name="{{ field }}__lte" inputmode="numeric" placeholder="최대{% if unit %} ({{ unit }}){% endif %}"
            class="w-full rounded-xl border border-gray-200 bg-white px-3 py-2 text-sm text-gray-900 outline-none transition-colors placeholder:text-gray-400 focus:border-red-500 focus:ring-2 focus:ring-red-500/20"
            data-filter-param />
    </div>
</div>
