<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>제품 페이지 구조</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
    }

    header {
      height: 120px;
      border: 4px solid red;
      padding: 20px;
    }

    header button {
      margin-right: 8px;
    }

    .layout {
      display: flex;
      min-height: 700px;
      border: 4px solid black;
      border-top: none;
    }

    nav {
      width: 250px;
      border: 4px solid blue;
      padding: 20px;
    }

    main {
      flex: 1;
      border: 4px solid gold;
      padding: 30px;
    }

    .product-card {
      width: 250px;
      height: 180px;
      border: 3px solid black;
      padding: 20px;
      margin-bottom: 20px;
      cursor: pointer;
    }

    .detail-image {
      width: 280px;
      height: 220px;
      border: 3px solid black;
      margin-bottom: 40px;
      padding: 20px;
    }

    .detail-info {
      width: 600px;
      height: 250px;
      border: 3px solid black;
      padding: 20px;
    }
  </style>
</head>

<body>

  <header>
    <button onclick="showCategory('home')">Home</button>
    <button onclick="showCategory('tv')">TV</button>
    <button onclick="showCategory('fridge')">냉장고</button>
    <button onclick="showCategory('washer')">세탁기</button>
    <button onclick="showCategory('aircon')">에어컨</button>
    <button onclick="showCategory('cleaner')">청소기</button>

    <button>로그인</button>
    <button>마이페이지</button>
  </header>

  <div class="layout">

    <nav id="filterNav">
      <!-- 카테고리별 필터가 JS로 들어감 -->
    </nav>

    <main id="mainContent">
      <!-- 상품 목록 / 상세 페이지가 JS로 들어감 -->
    </main>

  </div>

  <script>
    const filterData = {
      home: `
        <h3>필터</h3>
        <p>카테고리를 선택하세요.</p>
      `,

      tv: `
        <h3>TV 필터</h3>

        <h4>브랜드</h4>
        <label><input type="checkbox" /> LG</label><br />
        <label><input type="checkbox" /> 삼성</label><br />

        <h4>화면 크기</h4>
        <label><input type="checkbox" /> 55인치</label><br />
        <label><input type="checkbox" /> 65인치</label><br />
        <label><input type="checkbox" /> 75인치</label><br />

        <h4>디스플레이</h4>
        <label><input type="checkbox" /> OLED</label><br />
        <label><input type="checkbox" /> QLED</label><br />
      `,

      fridge: `
        <h3>냉장고 필터</h3>

        <h4>브랜드</h4>
        <label><input type="checkbox" /> LG</label><br />
        <label><input type="checkbox" /> 삼성</label><br />

        <h4>용량</h4>
        <label><input type="checkbox" /> 600L 이하</label><br />
        <label><input type="checkbox" /> 700L 이상</label><br />

        <h4>도어 타입</h4>
        <label><input type="checkbox" /> 양문형</label><br />
        <label><input type="checkbox" /> 4도어</label><br />
      `,

      washer: `
        <h3>세탁기 필터</h3>

        <h4>브랜드</h4>
        <label><input type="checkbox" /> LG</label><br />
        <label><input type="checkbox" /> 삼성</label><br />

        <h4>세탁 용량</h4>
        <label><input type="checkbox" /> 15kg 이하</label><br />
        <label><input type="checkbox" /> 20kg 이상</label><br />

        <h4>방식</h4>
        <label><input type="checkbox" /> 드럼</label><br />
        <label><input type="checkbox" /> 통돌이</label><br />
      `,

      aircon: `
        <h3>에어컨 필터</h3>

        <h4>브랜드</h4>
        <label><input type="checkbox" /> LG</label><br />
        <label><input type="checkbox" /> 삼성</label><br />

        <h4>형태</h4>
        <label><input type="checkbox" /> 스탠드형</label><br />
        <label><input type="checkbox" /> 벽걸이형</label><br />

        <h4>냉방 면적</h4>
        <label><input type="checkbox" /> 10평 이하</label><br />
        <label><input type="checkbox" /> 20평 이상</label><br />
      `,

      cleaner: `
        <h3>청소기 필터</h3>

        <h4>브랜드</h4>
        <label><input type="checkbox" /> LG</label><br />
        <label><input type="checkbox" /> 삼성</label><br />

        <h4>형태</h4>
        <label><input type="checkbox" /> 무선</label><br />
        <label><input type="checkbox" /> 로봇청소기</label><br />

        <h4>흡입력</h4>
        <label><input type="checkbox" /> 200W 이하</label><br />
        <label><input type="checkbox" /> 200W 이상</label><br />
      `
    };

    const productData = {
      home: `
        <h2>제품을 선택하세요</h2>
        <p>상단 카테고리 버튼을 누르면 해당 상품 목록이 나옵니다.</p>
      `,

      tv: `
        <h2>TV 상품 목록</h2>

        <article class="product-card" onclick="showDetail('LG OLED TV')">
          <h3>LG OLED TV</h3>
          <p>2,389,000원</p>
          <button>상세보기</button>
        </article>

        <article class="product-card" onclick="showDetail('삼성 QLED TV')">
          <h3>삼성 QLED TV</h3>
          <p>1,990,000원</p>
          <button>상세보기</button>
        </article>
      `,

      fridge: `
        <h2>냉장고 상품 목록</h2>

        <article class="product-card" onclick="showDetail('LG 냉장고')">
          <h3>LG 냉장고</h3>
          <p>1,500,000원</p>
          <button>상세보기</button>
        </article>
      `,

      washer: `
        <h2>세탁기 상품 목록</h2>

        <article class="product-card" onclick="showDetail('LG 세탁기')">
          <h3>LG 세탁기</h3>
          <p>990,000원</p>
          <button>상세보기</button>
        </article>
      `,

      aircon: `
        <h2>에어컨 상품 목록</h2>

        <article class="product-card" onclick="showDetail('삼성 에어컨')">
          <h3>삼성 에어컨</h3>
          <p>1,200,000원</p>
          <button>상세보기</button>
        </article>
      `,

      cleaner: `
        <h2>청소기 상품 목록</h2>

        <article class="product-card" onclick="showDetail('LG 무선 청소기')">
          <h3>LG 무선 청소기</h3>
          <p>690,000원</p>
          <button>상세보기</button>
        </article>
      `
    };

    function showCategory(category) {
      document.getElementById("filterNav").style.display = "block";
      document.getElementById("filterNav").innerHTML = filterData[category];
      document.getElementById("mainContent").innerHTML = productData[category];
    }

    function showDetail(productName) {
      document.getElementById("filterNav").style.display = "none";

      document.getElementById("mainContent").innerHTML = `
        <button onclick="showCategory('tv')">← 목록으로</button>

        <h2>제품 상세 페이지</h2>

        <div class="detail-image">
          이미지 영역
        </div>

        <div class="detail-info">
          <h3>${productName}</h3>
          <p>상품 설명 영역</p>
          <p>가격 영역</p>

          <button>찜하기</button>
          <button>구매하기</button>
        </div>
      `;
    }

    showCategory("home");
  </script>

</body>
</html>
