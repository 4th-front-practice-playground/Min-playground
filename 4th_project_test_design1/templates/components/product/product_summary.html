<section class="grid gap-8 overflow-hidden rounded-3xl border border-gray-100 bg-white p-6 shadow-sm md:grid-cols-2 md:p-8 lg:gap-10">
    <div class="flex h-72 items-center justify-center overflow-hidden rounded-2xl bg-gray-50 text-gray-300 sm:h-80 md:h-96">
        {% if product.image_url %}
        <img src="{{ product.image_url }}" alt="{{ product.name }}" class="h-full w-full object-cover" />
        {% else %}
        상품 이미지
        {% endif %}
    </div>

    <div class="flex flex-col justify-center">
        <p class="mb-2 text-xs font-semibold uppercase tracking-wider text-red-600">{{ product.category }}</p>

        <h1 class="mb-4 text-2xl font-bold leading-tight tracking-tight text-gray-900 sm:text-3xl">{{ product.name }}</h1>

        <p class="mb-8 text-base leading-relaxed text-gray-500">{{ product.description }}</p>

        <p class="text-3xl font-bold text-red-600">{{ product.price|floatformat:0 }}원</p>
    </div>
</section>
