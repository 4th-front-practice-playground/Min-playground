<section class="grid grid-cols-2 gap-3 sm:grid-cols-3 md:grid-cols-5 md:gap-4">
    {% for category in categories %}
    <a href="{% url 'products:searchpage' %}?category={{ category|urlencode }}"
        class="rounded-2xl border p-4 text-center text-sm font-medium transition-all duration-200 sm:p-5 {% if category == selected_category %}border-red-600 bg-red-50 font-bold text-red-600 shadow-sm{% else %}border-gray-100 bg-white text-gray-800 shadow-sm hover:border-gray-200 hover:bg-gray-50 hover:shadow-md{% endif %}">
        {{ category }}
    </a>
    {% endfor %}
</section>
