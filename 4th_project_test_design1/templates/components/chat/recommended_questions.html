<div id="chat-recommended" class="flex flex-1 items-center justify-center p-6 sm:p-8">
    <div class="w-full max-w-2xl text-center">
        <h2 class="mb-2 text-xl font-bold tracking-tight text-gray-900 sm:text-2xl">무엇을 도와드릴까요?</h2>

        <p class="mb-8 text-sm leading-relaxed text-gray-500 sm:text-base">
            원하는 가전 조건을 선택하거나 직접 입력해보세요.
        </p>

        <div class="grid gap-3 sm:grid-cols-2">
            {% for question in recommended_questions %}
            <button type="button" data-recommended-question="{{ question }}"
                class="rounded-2xl border border-gray-100 bg-white p-4 text-left text-sm leading-relaxed text-gray-800 shadow-sm transition-all duration-200 hover:border-red-100 hover:bg-red-50/30 hover:shadow-md">
                {{ question }}
            </button>
            {% endfor %}
        </div>
    </div>
</div>
