<section class="rounded-2xl border bg-white p-6 shadow-sm">
    <div class="flex items-center gap-5">
        {% if request.user.profile_picture %}
        <img src="{{ request.user.profile_picture.url }}" alt="프로필"
            class="h-20 w-20 shrink-0 rounded-full object-cover">
        {% else %}
        <div class="flex h-20 w-20 shrink-0 items-center justify-center rounded-full bg-red-100 text-2xl font-bold text-red-600">
            {{ nickname|slice:":1"|upper }}
        </div>
        {% endif %}

        <div>
            <h2 class="text-xl font-bold text-gray-900">{{ nickname }}님</h2>
            <p class="mt-1 text-sm text-gray-500">{{ email }}</p>
        </div>
    </div>

    <button type="button"
        class="mt-6 w-full rounded-lg border px-4 py-2 text-sm text-gray-900 hover:bg-gray-50">
        프로필 수정
    </button>
</section>
