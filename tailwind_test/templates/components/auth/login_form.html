<div id="auth-panel-login" class="auth-panel">
    <h1 class="mb-2 text-center text-3xl font-bold text-gray-900">로그인</h1>

    <p class="mb-8 text-center text-sm text-gray-500">
        LG 가전 추천 서비스를 이용하려면 로그인해주세요.
    </p>

    {% if login_fail %}
    <p class="mb-4 text-center text-sm text-red-600">아이디 또는 비밀번호가 올바르지 않습니다.</p>
    {% endif %}

    <form method="post" class="space-y-4">
        {% csrf_token %}
        <div>
            <label class="mb-2 block text-sm font-medium text-gray-900">아이디</label>
            <input type="text" name="username" placeholder="아이디를 입력하세요" required
                class="w-full rounded-lg border px-4 py-3 text-gray-900 outline-none focus:border-red-500" />
        </div>

        <div>
            <label class="mb-2 block text-sm font-medium text-gray-900">비밀번호</label>
            <input type="password" name="password" placeholder="비밀번호를 입력하세요" required
                class="w-full rounded-lg border px-4 py-3 text-gray-900 outline-none focus:border-red-500" />
        </div>

        <button type="submit"
            class="w-full rounded-lg bg-red-600 py-3 font-semibold text-white hover:bg-red-700">
            로그인
        </button>
    </form>

    <div class="mt-6 flex justify-center gap-4 text-sm text-gray-500">
        <button type="button" data-auth-mode="findId">아이디 찾기</button>
        <button type="button" data-auth-mode="resetPassword">비밀번호 찾기</button>
        <button type="button" data-auth-mode="signup">회원가입</button>
    </div>
</div>
