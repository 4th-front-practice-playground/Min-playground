{% load static %}
<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LG Products</title>
    <link rel="stylesheet" href="{% static 'products/products.css' %}">
</head>
<body>
    <div class="page-shell">
        <header class="header">
            <a class="header-button" href="/">Home</a>
            <nav class="header-actions" aria-label="사용자 메뉴">
                <a class="header-button" href="/accounts/login/">로그인</a>
                <button class="header-button" type="button" onclick="goToMyPage()">마이페이지</button>
            </nav>
        </header>

        <nav class="category-menu" aria-label="상품 카테고리">
            <button class="category-button" type="button" data-category="tv">
                <span>TV<br>(이미지)</span>
            </button>
            <button class="category-button" type="button" data-category="refrigerator">
                <span>냉장고<br>(이미지)</span>
            </button>
            <button class="category-button" type="button" data-category="air-conditioner">
                <span>에어컨<br>(이미지)</span>
            </button>
            <button class="category-button" type="button" data-category="vacuum">
                <span>청소기<br>(이미지)</span>
            </button>
            <button class="category-button" type="button" data-category="washing-machine">
                <span>세탁기<br>(이미지)</span>
            </button>
        </nav>

        <main class="products-layout" id="productsLayout">
            <aside class="filter-sidebar" id="filterSidebar" aria-label="상품 필터">
                <section class="filter-section">
                    <h2 class="filter-title">가격대</h2>
                    <div class="filter-row">
                        <input type="number" id="minPrice" placeholder="최소">
                        <span>~</span>
                        <input type="number" id="maxPrice" placeholder="최대">
                    </div>
                    <div class="range-placeholder" aria-hidden="true">
                        <span></span>
                    </div>
                </section>

                <section class="filter-section">
                    <h2 class="filter-title">소비 전력</h2>
                    <div class="filter-row">
                        <input type="number" id="minPower" placeholder="최소">
                        <span>~</span>
                        <input type="number" id="maxPower" placeholder="최대">
                    </div>
                    <div class="range-placeholder" aria-hidden="true">
                        <span></span>
                    </div>
                </section>

                <section class="filter-section future-filter">
                    <h2 class="filter-title">추가 필터</h2>
                    <p>체크박스 필터 영역</p>
                </section>
            </aside>

            <section class="content-area" id="contentArea" aria-live="polite"></section>
        </main>
    </div>

    <script src="{% static 'products/products.js' %}"></script>
</body>
</html>
