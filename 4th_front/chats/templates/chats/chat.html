{% load static %}
<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LG Bot Chat</title>
    <link rel="stylesheet" href="{% static 'chats/chat.css' %}">
</head>
<body>
    <div class="page-shell">
        <header class="header">
            <a class="header-button" href="/">Home</a>
            <nav class="header-actions" aria-label="사용자 메뉴">
                <a class="header-button" href="/accounts/login/">로그인</a>
                <button class="header-button" type="button" onclick="goToMyPage()">마이페이지</button>
            </nav>
        </header>

        <main class="chat-layout">
            <aside class="chat-sidebar" aria-label="채팅 검색 기록">
                <button class="new-chat-button" type="button">새 대화</button>
                <h1 class="sidebar-title">최근 대화</h1>
                <ul class="history-list" id="historyList">
                    <li>서예림 독립생활</li>
                    <li>서연희 동</li>
                    <li>박기은 바보</li>
                    <li>박길 궁짝짝</li>
                    <li>김민수 에어컨</li>
                </ul>
            </aside>

            <section class="chat-content" aria-label="채팅 영역">
                <div class="message-list" id="messageList">
                    <div class="message ai-message">
                        <strong>ai</strong>
                        <p>안녕하세요. 박기은님! 궁금하세요?</p>
                    </div>
                    <div class="message user-message">
                        <strong>user</strong>
                        <p>박기은 검색해줘</p>
                    </div>
                </div>

                <form class="message-form" onsubmit="sendMessage(event)">
                    <input id="messageInput" type="text" placeholder="메시지를 입력하세요.">
                    <button type="submit" aria-label="전송">↑</button>
                </form>
            </section>
        </main>
    </div>

    <script src="{% static 'chats/chat.js' %}"></script>
</body>
</html>
