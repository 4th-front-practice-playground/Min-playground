{% load static %}
<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LG Life Main</title>
    <link rel="stylesheet" href="{% static 'mainpage/mainpage.css' %}">
</head>
<body>
    <div class="page-shell">
        <header class="header">
            <div class="header-spacer" aria-hidden="true"></div>
            <nav class="header-actions" aria-label="사용자 메뉴">
                <a class="header-button" href="/accounts/login/">로그인</a>
                <button class="header-button" type="button" onclick="goToMyPage()">마이페이지</button>
            </nav>
        </header>

        <main class="main-content">
            <section class="hero-section" aria-labelledby="hero-title">
                <div class="hero-placeholder">
                    <div class="hero-product-row">
                        <span class="appliance-box washer"></span>
                        <span class="appliance-box tower"></span>
                        <span class="appliance-box small"></span>
                    </div>
                    <p class="hero-brand">LG TrueSteam</p>
                    <p class="hero-note">LG 광고 이미지 placeholder</p>
                </div>
                <p id="hero-title" class="hero-copy">"당신에게 맞춰 계속 더 좋아지는 가전"</p>
            </section>

            <a class="chat-floating-button" href="/chats/" aria-label="LG봇 채팅으로 이동">LG 봇</a>

            <section class="category-section" aria-labelledby="category-title">
                <h2 id="category-title" class="section-title">카테고리</h2>
                <div class="category-grid">
                    <a class="category-card" href="/products/?category=tv">
                        <span class="category-image">TV<br>(이미지)</span>
                        <span class="category-name">TV</span>
                    </a>
                    <a class="category-card" href="/products/?category=refrigerator">
                        <span class="category-image">냉장고<br>(이미지)</span>
                        <span class="category-name">냉장고</span>
                    </a>
                    <a class="category-card" href="/products/?category=air-conditioner">
                        <span class="category-image">에어컨<br>(이미지)</span>
                        <span class="category-name">에어컨</span>
                    </a>
                    <a class="category-card" href="/products/?category=vacuum">
                        <span class="category-image">청소기<br>(이미지)</span>
                        <span class="category-name">청소기</span>
                    </a>
                    <a class="category-card" href="/products/?category=washing-machine">
                        <span class="category-image">세탁기<br>(이미지)</span>
                        <span class="category-name">세탁기</span>
                    </a>
                </div>
            </section>
        </main>
    </div>

    <script src="{% static 'mainpage/mainpage.js' %}"></script>
</body>
</html>
